<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Transformation Resource Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚧</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0078d4 0%, #50e6ff 50%, #00b294 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .banner {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 3rem 4rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .construction-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        .stripes {
            height: 24px;
            background: repeating-linear-gradient(
                45deg,
                #ffd700,
                #ffd700 20px,
                #1a1a1a 20px,
                #1a1a1a 40px
            );
            border-radius: 6px;
            margin: 2rem 0;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .description {
            font-size: 1.05rem;
            line-height: 1.7;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .footer {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            transition: opacity 0.2s;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .banner {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <div class="construction-icon">🚧</div>
            <h1>Under Construction</h1>
            <p class="subtitle">Copilot Transformation Resource Hub</p>
            <div class="stripes"></div>
            <p class="description">
                We're hard at work building something great. Check back soon for tools,
                guidance, and resources to accelerate your Copilot transformation journey.
            </p>
        </div>
        <div class="footer">
            <a href="https://github.com/microsoft/Copilot-Transformation-Resource-Hub" target="_blank" rel="noopener">View on GitHub</a>
        </div>
    </div>
</body>
</html>
